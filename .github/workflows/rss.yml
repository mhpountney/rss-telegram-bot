name: RSS to Telegram

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay during busy periods)
  workflow_dispatch:           # lets you run it manually from the Actions tab

# Allow the job to commit the updated seen.json back to the repo.
permissions:
  contents: write

# Don't let two runs overlap and fight over seen.json.
concurrency:
  group: rss-to-telegram
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    # Hard ceiling so a stuck step can never hang for hours and burn minutes.
    timeout-minutes: 10
    env:
      # Make git fail fast instead of silently waiting on a credential prompt.
      GIT_TERMINAL_PROMPT: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain seen.json)" ]]; then
            echo "No new items; nothing to commit."
            exit 0
          fi
          git add seen.json
          git commit -m "Update seen items [skip ci]"
          # The remote may have advanced (e.g. when re-running an old run), so
          # rebase onto it before pushing, and retry to absorb races.
          for attempt in 1 2 3; do
            if git pull --rebase origin "$GITHUB_REF_NAME" && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep 3
          done
          echo "Failed to push after 3 attempts." >&2
          exit 1
